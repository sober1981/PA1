# ============================================================================
# PA1 - Performance Agent Configuration
# ============================================================================

# SharePoint connection (reads master file directly like Power BI)
sharepoint:
  site_url: "https://scoutdownholecom.sharepoint.com/sites/DBRunsUpdate"
  file_pattern: "MASTER_MCS_MERGE_"
  # Exclude files with these substrings in filename
  exclude_patterns: ["Downloaded", "TEST", "backup", "original", "back up"]

# Local vs Shared file search.
#   - local_paths  = your personal OneDrive copy (pre-QC, won't be touched by team)
#   - shared_paths = Teams-synced folder (post-QC, the file the team edits)
# search_paths is the union of both, kept for any code still using it.
data:
  local_paths:
    - "C:\\Users\\jsoberanes\\OneDrive - Scout Downhole\\Drilling Opt Projects\\Scorecard"
  shared_paths:
    - "C:\\Users\\jsoberanes\\Scout Downhole\\DB Runs Update - Documents\\General"
  search_paths:
    - "C:\\Users\\jsoberanes\\Scout Downhole\\DB Runs Update - Documents\\General"
    - "C:\\Users\\jsoberanes\\OneDrive - Scout Downhole\\Drilling Opt Projects\\Scorecard"
  file_pattern: "MASTER_MCS_MERGE_*.xlsx"
  sheet_name: "Sheet1"
  recursive: true

# Date filtering
filtering:
  date_column: "DATE_OUT"
  week_column: "Week #"
  comparison_start_date: "2025-01-01"

# Email
email:
  recipient: "jsoberanes@scoutdownhole.com"

# ============================================================================
# Variable Groups - dimensions used for comparisons
# ============================================================================
variable_groups:
  motor:
    columns: ["MOTOR_MODEL", "LOBE/STAGE", "MOTOR_TYPE2", "BEND_HSG"]
  bit:
    columns: ["BIT_MODEL"]
  location:
    columns: ["BASIN", "COUNTY", "FORMATION"]
  section:
    columns: ["HOLE_SIZE", "Phase_CALC"]
  depth:
    columns: ["DEPTH_IN", "DEPTH_OUT", "TOTAL_DRILL"]

# ============================================================================
# Category 1: Week vs Previous Week
# ============================================================================
category1:
  enabled: true

  # Section A: Weekly Summary
  weekly_summary:
    group_by_primary: "JOB_TYPE"
    group_by_secondary: "MOTOR_TYPE2"
    metrics:
      - column: "TOTAL_DRILL"
        label: "Total Footage"
        unit: "ft"
      - column: "Total Hrs (C+D)"
        label: "Total Hrs (C+D)"
        unit: "hrs"

  # Section B: Curves Analysis
  curves:
    source_filter: "Motor_KPI"
    runs_per_cur_col: "RUNS PER CUR"
    phase_contains: "CUR"

  # Section C: Reason to POOH
  reason_pooh:
    source_filter: ["Motor_KPI", "CAM_Run_Tracker"]
    wednesday_col: "REASON_POOH"
    friday_col: "REASON_POOH_QC"
    classifications:
      td: ["TD", "SECTION TD", "WELL TD"]
      rop: ["ROP", "BUILD RATES"]
      bit: ["BIT"]
      motor: ["MOTOR", "MOTOR FAILURE", "MOTOR CHUNKED"]
      mwd: ["MWD", "MWD FAILURE"]
      bha: ["BHA"]
      pressure: ["PRESSURE"]
      # Everything else falls into "other"

# ============================================================================
# Category 2: Monthly Highlights
# ============================================================================
category2:
  enabled: true

  longest_runs:
    top_n: 5

  fastest_sections:
    top_n: 5

  operator_analysis:
    source_filter: ["Motor_KPI", "CAM_Run_Tracker"]
    success_values: ["TD", "SECTION TD", "WELL TD"]
    motor_failure_values: ["MOTOR", "MOTOR FAILURE", "MOTOR CHUNKED"]
    curve_source_filter: "Motor_KPI"

# ============================================================================
# Category 3: Historical Analysis (KPIs)
# ============================================================================
kpis:
  avg_rop:
    enabled: true
    flag_below_std: 1.0
    flag_above_std: 1.5
    comparison_levels:
      - ["HOLE_SIZE", "Phase_CALC", "BASIN", "COUNTY", "FORMATION", "MOTOR_MODEL"]
      - ["HOLE_SIZE", "Phase_CALC", "BASIN", "COUNTY", "MOTOR_MODEL"]
      - ["HOLE_SIZE", "Phase_CALC", "BASIN", "MOTOR_MODEL"]
      - ["HOLE_SIZE", "Phase_CALC", "BASIN"]
      - ["HOLE_SIZE", "BASIN"]
      - ["BASIN", "Phase_CALC"]
      - ["BASIN"]

  longest_runs:
    enabled: true
    top_n: 5
    comparison_levels:
      - ["HOLE_SIZE", "Phase_CALC", "BASIN", "COUNTY", "FORMATION"]
      - ["HOLE_SIZE", "Phase_CALC", "BASIN", "COUNTY"]
      - ["HOLE_SIZE", "Phase_CALC", "BASIN"]
      - ["HOLE_SIZE", "BASIN"]
      - ["BASIN", "Phase_CALC"]
      - ["BASIN"]

  sliding_pct:
    enabled: true
    phase_filter: ["LAT"]
    flag_above_percentile: 75
    comparison_levels:
      - ["BASIN", "COUNTY", "HOLE_SIZE", "MOTOR_MODEL", "FORMATION"]
      - ["BASIN", "COUNTY", "HOLE_SIZE", "MOTOR_MODEL"]
      - ["BASIN", "HOLE_SIZE", "MOTOR_MODEL"]
      - ["BASIN", "HOLE_SIZE"]
      - ["BASIN", "MOTOR_MODEL"]
      - ["BASIN"]

# ============================================================================
# Category 4: QC Audit (Friday Report Only)
# ============================================================================
category4:
  enabled: true
  # Composite key for matching rows between Wed and Fri files
  match_keys: ["OPERATOR", "WELL", "SN", "DEPTH_IN"]
  # Columns to exclude from diff (keys, expected diffs, metadata)
  exclude_from_diff: ["OPERATOR", "WELL", "SN", "DEPTH_IN", "DEPTH_OUT",
                       "REASON_POOH_QC", "QC BY", "QC_FLAG"]
  # QC reviewer column
  qc_by_col: "QC BY"
  # Tolerance for float comparison (differences below this are ignored)
  float_tolerance: 0.01

comparison:
  min_sample_size: 10

# ============================================================================
# Data Cleaning
# ============================================================================
cleaning:
  strip_whitespace: ["BASIN", "Phase_CALC", "OPERATOR", "WELL", "COUNTY",
                     "FORMATION", "LOBE/STAGE", "BIT_MODEL", "MOTOR_TYPE2",
                     "JOB_TYPE", "SOURCE", "REASON_POOH", "REASON_POOH_QC"]
  to_numeric: ["ROTATE_DRILL", "SLIDE_DRILLED", "AVG_ROP", "TOTAL_DRILL",
               "ROTATE_ROP", "SLIDE_ROP", "DRILLING_HOURS", "DEPTH_IN", "DEPTH_OUT",
               "HOLE_SIZE", "BEND_HSG", "RUNS PER CUR", "Total Hrs (C+D)", "CIRC_HOURS"]
  to_datetime: ["DATE_OUT", "DATE_IN"]
  uppercase: ["REASON_POOH", "REASON_POOH_QC"]
  basin_aliases:
    "TX-LA-MS Salt": "TX-LA-MS Sal"
  hole_size_max: 26.0
  lobe_stage_separator: ":"
